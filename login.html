<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Arcade | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <i class="fas fa-gamepad"></i> CYBER ARCADE
            </div>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-icon" style="font-size: 3rem; color: var(--neon-blue); margin-bottom: 1rem; text-shadow: 0 0 15px var(--neon-blue);">
                <i class="fas fa-lock-open"></i>
            </div>
            <h1 class="auth-title">CORE ACCESS</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Authorized Operatives Only. Please authenticate.</p>
            
            <form class="auth-form" id="login-form">
                <div class="input-group">
                    <label>OPERATIVE ID</label>
                    <input type="text" id="login-username" class="auth-input" required placeholder="example: CyberHacker_01">
                </div>
                <div class="input-group">
                    <label>DECRYPTION KEY</label>
                    <input type="password" id="login-password" class="auth-input" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-neon" style="margin-top: 2rem; width: 100%;">
                    <i class="fas fa-unlock-keyhole"></i> INITIALIZE SESSION
                </button>
            </form>
            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px dashed rgba(255,255,255,0.1);">
                <span style="color: rgba(255,255,255,0.4); font-size: 0.85rem;">New Recruit?</span>
                <a href="signup.html" class="auth-link">Create Account Profile</a>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
