<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Arcade | Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <i class="fas fa-gamepad"></i> CYBER ARCADE
            </div>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-icon" style="font-size: 3rem; color: var(--neon-green); margin-bottom: 1rem; text-shadow: 0 0 15px var(--neon-green);">
                <i class="fas fa-fingerprint"></i>
            </div>
            <h1 class="auth-title" style="color: var(--neon-green)">INITIALIZE PROFILE</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Register your operative alias in the global network.</p>
            
            <form class="auth-form" id="signup-form">
                <div class="input-group">
                    <label>CHOOSE YOUR ALIAS</label>
                    <input type="text" id="signup-username" class="auth-input" required placeholder="Choose a unique name">
                </div>
                <div class="input-group">
                    <label>SECURE ACCESS CODE</label>
                    <input type="password" id="signup-password" class="auth-input" required placeholder="Enter a secure password">
                </div>
                <button type="submit" class="btn-neon btn-neon-green" style="margin-top: 2rem; width: 100%;">
                    <i class="fas fa-user-plus"></i> CREATE OPERATIVE PROFILE
                </button>
            </form>
            <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px dashed rgba(255,255,255,0.1);">
                <span style="color: rgba(255,255,255,0.4); font-size: 0.85rem;">Already have a profile?</span>
                <a href="login.html" class="auth-link">Authenticate Session</a>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
